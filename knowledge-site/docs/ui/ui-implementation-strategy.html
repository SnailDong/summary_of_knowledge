<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>UI Strategy — Knowledge Site</title>
</head>
<body>
  <main>
    <h1>UI Strategy — Knowledge Site</h1>
    <section>
      <h2>页面</h2>
      <ul>
        <li>首页：分类入口、近期内容、导出说明。</li>
        <li>简历页：HTML 简历入口、PDF 下载。</li>
        <li>列表页：项目经验、技术笔记、AI workflow skills。</li>
        <li>文章页：Markdown 内容阅读，移动端单栏布局。</li>
      </ul>
    </section>
    <section>
      <h2>移动端策略</h2>
      <ul>
        <li>导航在小屏幕自动换行。</li>
        <li>内容最大宽度限制，正文行高保持阅读舒适。</li>
        <li>代码块横向滚动，不撑破页面。</li>
      </ul>
    </section>
  </main>
</body>
</html>
