<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Local Dev — Knowledge Site</title>
</head>
<body>
  <main>
    <h1>Local Dev — Knowledge Site</h1>
    <ol>
      <li>进入 `knowledge-site/`。</li>
      <li>执行 `npm install` 安装依赖。</li>
      <li>执行 `npm run dev` 本地预览。</li>
      <li>执行 `npm run build` 导出 `dist/`。</li>
      <li>执行 `npm run preview` 预览导出结果。</li>
    </ol>
    <p>如需手机访问本地预览，电脑和手机需在同一网络，使用电脑局域网 IP 加端口访问。</p>
  </main>
</body>
</html>
