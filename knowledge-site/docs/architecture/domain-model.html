<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Domain Model — Knowledge Site</title>
</head>
<body>
  <main>
    <h1>Domain Model — Knowledge Site</h1>
    <dl>
      <dt>Source Content</dt>
      <dd>父目录中的原始 Markdown、HTML、PDF 文件。</dd>
      <dt>Synced Content</dt>
      <dd>复制到 Astro 工程 `src/content` 下的构建输入。</dd>
      <dt>Section</dt>
      <dd>站点一级分类，例如 Projects、Technical Notes、AI Workflow Skills。</dd>
      <dt>Article</dt>
      <dd>由 Markdown 文件生成的详情页。</dd>
      <dt>Export</dt>
      <dd>`npm run build` 生成的 `dist/` 静态网站。</dd>
    </dl>
  </main>
</body>
</html>
